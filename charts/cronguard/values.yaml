image:
  repository: ghcr.io/dmazhukov/cronguard
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when empty.
  tag: ""

imagePullSecrets: []

# Extra command-line args passed to the manager binary. Useful for
# bumping log verbosity (`--zap-log-level=2`) or pinning a specific
# leader-election lease name without forking the chart.
extraArgs: []
# - --zap-log-level=2

# Extra environment variables added to the manager container. Take a
# standard list of EnvVar specs (see PodSpec.containers.env).
extraEnv: []
# - name: GOMEMLIMIT
#   value: "200MiB"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Number of operator replicas. Set to 2 for HA — leader election ensures only
# one reconciler is active at a time.
replicaCount: 1

# Restrict the operator to a single namespace. Empty means cluster-wide watch.
namespace: ""

leaderElection:
  enabled: true

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

metrics:
  port: 8080
healthProbe:
  port: 8081

# ServiceMonitor for prometheus-operator integrations.
serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: false

# PrometheusRule for opinionated CronGuard alerts.
# Requires prometheus-operator CRDs in the cluster.
prometheusRule:
  enabled: false
  namespace: ""
  labels: {}
  interval: 30s
  thresholds:
    scheduleMissed:
      for: 5m
      severity: warning
    consecutiveFailures:
      for: 5m
      severity: warning
    durationExceeded:
      for: 1m
      severity: info
    notReady:
      for: 10m
      severity: critical
    operatorDown:
      for: 2m
      severity: critical
    missedRunsBurnFast:
      fastRate: 1     # > N missed runs/min over 5m
      slowRate: 6     # AND > N missed runs/hour over 1h
      for: 2m
      severity: warning
    missedRunsBurnSlow:
      fastRate: 1     # > N missed runs/hour over 1h
      slowRate: 3     # AND > N missed runs over 6h
      for: 15m
      severity: info

# CRD installation. Helm 3 installs crds/ on install only — never on upgrade.
crds:
  install: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# topologySpreadConstraints distributes pods across failure domains
# (e.g., zones, racks). Mostly relevant when replicaCount > 1; for the
# default single-replica setup the field is unused.
topologySpreadConstraints: []
# - maxSkew: 1
#   topologyKey: topology.kubernetes.io/zone
#   whenUnsatisfiable: ScheduleAnyway
#   labelSelector:
#     matchLabels:
#       app.kubernetes.io/name: cronguard

# Opt-in PodDisruptionBudget. Only useful when replicaCount > 1 — for a
# single replica the budget can't actually shield against voluntary
# disruption (one pod, no surge under maxSurge: 0). Off by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # mutually exclusive with minAvailable

priorityClassName: ""

terminationGracePeriodSeconds: 30
