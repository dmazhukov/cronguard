apiVersion: v1
kind: Service
metadata:
  name: {{ include "cronguard.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cronguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "cronguard.selectorLabels" . | nindent 4 }}
