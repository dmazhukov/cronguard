{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cronguard.fullname" . }}
  namespace: {{ default .Release.Namespace .Values.serviceMonitor.namespace }}
  labels:
    {{- include "cronguard.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "cronguard.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      honorLabels: {{ .Values.serviceMonitor.honorLabels }}
      {{- if gt (int .Values.replicaCount) 1 }}
      relabelings:
        # HA metrics dedup: skip standby replicas. The Labeler in cmd/main.go
        # writes cronguard.io/role on each pod; only leader=true is scraped,
        # otherwise Prometheus double-counts every cronguard_* gauge.
        - sourceLabels: [__meta_kubernetes_pod_label_cronguard_io_role]
          regex: leader
          action: keep
      {{- end }}
{{- end }}
