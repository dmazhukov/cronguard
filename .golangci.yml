version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gosec:
      excludes:
        - G601   # implicit memory aliasing in for loop (benign pattern in k8s code)
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    paths:
      - vendor
      - testbin
    rules:
      - path: _test\.go
        linters:
          - gosec
          - revive
      - path: test/
        linters:
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - vendor
      - testbin
