name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install envtest
        run: make envtest
      - name: Run tests
        run: make test
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: cover.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: go build
        run: go build ./...
      - name: docker build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: cronguard:ci
      # Image-level CVE scan. govulncheck (separate job) covers the Go
      # dependency tree only. Trivy adds OS-level scanning of the
      # distroless layer for any glibc / libssl-style CVEs. Severity
      # filter set to HIGH/CRITICAL to keep the gate signal-only;
      # MEDIUM and below produce informational logs that don't fail CI.
      - name: trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cronguard:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  prometheus-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install promtool
        run: |
          PROM_VERSION=2.55.1
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" | tar -xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
      - name: Validate rules
        run: |
          # The file is a PrometheusRule CRD; promtool wants bare RuleGroups.
          yq eval '.spec' config/prometheus/rules.yaml | promtool check rules /dev/stdin

  # Guards that the regenerated outputs of `make manifests generate` match what's
  # checked into the repo. Without this, a contributor changing a kubebuilder
  # marker (e.g., +kubebuilder:validation:Pattern) and forgetting `make
  # manifests` lets the CRD YAML drift from the Go struct silently, which
  # then ships as a broken release. Standard kubebuilder pattern.
  manifests-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Regenerate
        run: make manifests generate
      - name: Diff
        run: |
          if ! git diff --exit-code config/crd config/rbac api/v1alpha1/zz_generated.deepcopy.go; then
            echo "::error::Generated files are stale. Run 'make manifests generate' locally and commit the result."
            exit 1
          fi

  # Phase 2 spec §6 acceptance criteria: helm lint + kubeconform on all
  # rendering combinations of the chart. Catches templating errors (typos
  # in {{ .Values.x }}, missing keys, indent regressions) before they reach
  # users.
  chart-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.4
      - name: helm lint
        run: helm lint charts/cronguard
      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar -xz
          sudo mv kubeconform /usr/local/bin/
      - name: kubeconform default values
        run: |
          helm template charts/cronguard | kubeconform -strict -summary -ignore-missing-schemas -
      - name: kubeconform — full opt-ins
        run: |
          helm template charts/cronguard \
            --set serviceMonitor.enabled=true \
            --set prometheusRule.enabled=true \
            --set replicaCount=2 \
            --set podDisruptionBudget.enabled=true \
            | kubeconform -strict -summary -ignore-missing-schemas -
