name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install envtest
        run: make envtest
      - name: Run tests
        run: make test
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: cover.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: go build
        run: go build ./...
      - name: docker build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: cronguard:ci
      # Image-level CVE scan. govulncheck (separate job) covers the Go
      # dependency tree only. Trivy adds OS-level scanning of the
      # distroless layer for any glibc / libssl-style CVEs. Severity
      # filter set to HIGH/CRITICAL to keep the gate signal-only;
      # MEDIUM and below produce informational logs that don't fail CI.
      - name: trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: cronguard:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  prometheus-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install promtool
        run: |
          PROM_VERSION=2.55.1
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" | tar -xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
      - name: Validate rules
        run: |
          # The file is a PrometheusRule CRD; promtool wants bare RuleGroups.
          yq eval '.spec' config/prometheus/rules.yaml | promtool check rules /dev/stdin
