name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dmazhukov/cronguard:${{ github.ref_name }}
            ghcr.io/dmazhukov/cronguard:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.8.1
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar -xz
          sudo mv kustomize /usr/local/bin/

      - name: Build install manifest
        run: |
          cd config/manager && kustomize edit set image controller=ghcr.io/dmazhukov/cronguard:${{ github.ref_name }} && cd -
          kustomize build config/default > install.yaml

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.yaml
            config/crd/bases/monitoring.cronguard.io_cronjobmonitors.yaml
          generate_release_notes: true

  chart:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        id: package
        run: |
          mkdir -p /tmp/chart
          VER="${{ github.ref_name }}"
          VER_NO_V="${VER#v}"
          helm package charts/cronguard \
            --version "${VER_NO_V}" --app-version "${VER_NO_V}" \
            -d /tmp/chart/
          PKG=$(ls /tmp/chart/*.tgz | head -1)
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$PKG")" >> "$GITHUB_OUTPUT"

      - name: Push chart to OCI
        run: |
          helm push "${{ steps.package.outputs.pkg }}" oci://ghcr.io/dmazhukov/charts

      - name: Stage gh-pages content
        run: |
          mkdir -p /tmp/gh-pages
          cp "${{ steps.package.outputs.pkg }}" /tmp/gh-pages/
          cp charts/cronguard/.artifacthub/artifacthub-repo.yml /tmp/gh-pages/artifacthub-repo.yml || true
          # Fetch existing index.yaml from gh-pages so we merge new release.
          if curl -fsSL "https://dmazhukov.github.io/cronguard/index.yaml" -o /tmp/gh-pages/index.yaml.existing; then
            helm repo index /tmp/gh-pages/ \
              --url "https://dmazhukov.github.io/cronguard/" \
              --merge /tmp/gh-pages/index.yaml.existing
            rm /tmp/gh-pages/index.yaml.existing
          else
            echo "No existing index.yaml — creating fresh"
            helm repo index /tmp/gh-pages/ \
              --url "https://dmazhukov.github.io/cronguard/"
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          keep_files: true
          commit_message: "publish ${{ steps.package.outputs.filename }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
