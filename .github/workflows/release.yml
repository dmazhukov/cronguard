name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Block the release on the main-branch CI run for this commit. Prevents
  # tagging a commit whose lint/test/build/vuln/prometheus-rules checks are
  # red or never ran. Polls up to 30 minutes, fails fast if no run exists.
  verify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Wait for ci.yml on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          attempts=60
          interval=30
          for i in $(seq 1 "$attempts"); do
            run=$(gh run list \
              --repo "$REPO" \
              --workflow=ci.yml \
              --commit "$SHA" \
              --limit 1 \
              --json databaseId,status,conclusion \
              --jq '.[0] // empty')
            if [ -z "$run" ]; then
              # First minute: tolerate "no run yet" — CI may still be queueing.
              # After that, give up: tagging a commit with no CI is the bug we
              # want to catch.
              if [ "$i" -gt 2 ]; then
                echo "::error::No ci.yml run found for commit $SHA after $((i*interval))s. Refusing to release."
                exit 1
              fi
              echo "[$i/$attempts] no ci.yml run yet for $SHA, sleeping ${interval}s"
              sleep "$interval"
              continue
            fi
            status=$(echo "$run" | jq -r .status)
            conclusion=$(echo "$run" | jq -r .conclusion)
            run_id=$(echo "$run" | jq -r .databaseId)
            echo "[$i/$attempts] ci.yml#$run_id status=$status conclusion=$conclusion"
            case "$status" in
              completed)
                if [ "$conclusion" = "success" ]; then
                  echo "ci.yml passed on $SHA — release proceeding"
                  exit 0
                fi
                echo "::error::ci.yml#$run_id finished with conclusion=$conclusion on $SHA. Refusing to release."
                exit 1
                ;;
              *)
                sleep "$interval"
                ;;
            esac
          done
          echo "::error::Timed out after $((attempts*interval))s waiting for ci.yml on $SHA"
          exit 1

  release:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strip leading "v" so the image carries both forms:
      #   ghcr.io/.../cronguard:v0.2.6  (matches the git tag)
      #   ghcr.io/.../cronguard:0.2.6   (matches Chart.AppVersion, which is
      #                                   what the Helm chart's deployment
      #                                   template renders by default)
      # Without the bare-semver tag, helm install with default values yields
      # ImagePullBackOff because .Chart.AppVersion is set to "0.2.6" (no v).
      - name: Compute semver tag (no v prefix)
        id: ver
        run: echo "no_v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dmazhukov/cronguard:${{ github.ref_name }}
            ghcr.io/dmazhukov/cronguard:${{ steps.ver.outputs.no_v }}
            ghcr.io/dmazhukov/cronguard:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.8.1
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar -xz
          sudo mv kustomize /usr/local/bin/

      - name: Build install manifest
        run: |
          cd config/manager && kustomize edit set image controller=ghcr.io/dmazhukov/cronguard:${{ github.ref_name }} && cd -
          kustomize build config/default > install.yaml

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.yaml
            config/crd/bases/monitoring.cronguard.io_cronjobmonitors.yaml
          generate_release_notes: true

  chart:
    runs-on: ubuntu-latest
    needs: [verify, release]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        id: package
        run: |
          mkdir -p /tmp/chart
          VER="${{ github.ref_name }}"
          VER_NO_V="${VER#v}"
          helm package charts/cronguard \
            --version "${VER_NO_V}" --app-version "${VER_NO_V}" \
            -d /tmp/chart/
          PKG=$(ls /tmp/chart/*.tgz | head -1)
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$PKG")" >> "$GITHUB_OUTPUT"

      - name: Push chart to OCI
        run: |
          helm push "${{ steps.package.outputs.pkg }}" oci://ghcr.io/dmazhukov/charts

      - name: Stage gh-pages content
        run: |
          mkdir -p /tmp/gh-pages
          cp "${{ steps.package.outputs.pkg }}" /tmp/gh-pages/
          cp charts/cronguard/.artifacthub/artifacthub-repo.yml /tmp/gh-pages/artifacthub-repo.yml || true
          # Fetch existing index.yaml from gh-pages so we merge new release.
          if curl -fsSL "https://dmazhukov.github.io/cronguard/index.yaml" -o /tmp/gh-pages/index.yaml.existing; then
            helm repo index /tmp/gh-pages/ \
              --url "https://dmazhukov.github.io/cronguard/" \
              --merge /tmp/gh-pages/index.yaml.existing
            rm /tmp/gh-pages/index.yaml.existing
          else
            echo "No existing index.yaml — creating fresh"
            helm repo index /tmp/gh-pages/ \
              --url "https://dmazhukov.github.io/cronguard/"
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          keep_files: true
          commit_message: "publish ${{ steps.package.outputs.filename }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

  # Auto-bump --version pins and download URLs in README, chart README, and
  # docs/distribution.md after a successful chart publish. Without this,
  # README pins drift behind the actual latest release every time we forget
  # to update them in the release PR (see PR #35 for the v0.2.2 → v0.2.6
  # cleanup that motivated this).
  #
  # Depends on chart so we don't bump pins for a release that failed to
  # publish artifacts.
  #
  # Caveat: GitHub Actions does NOT trigger ci.yml on a PR opened with
  # GITHUB_TOKEN (loop-prevention). The PR sits with no checks until a
  # human closes+reopens it (one click), or it's merged via admin bypass
  # since the change is docs-only.
  bump-docs:
    runs-on: ubuntu-latest
    needs: [verify, release, chart]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute bare-semver version
        id: ver
        run: echo "no_v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump pins in docs
        env:
          NEW_VER: ${{ steps.ver.outputs.no_v }}
        run: |
          set -euo pipefail
          for f in README.md charts/cronguard/README.md docs/distribution.md; do
            sed -i -E "
              s#(--version )[0-9]+\.[0-9]+\.[0-9]+#\1${NEW_VER}#g
              s#(releases/download/v)[0-9]+\.[0-9]+\.[0-9]+#\1${NEW_VER}#g
              s#(github\.com/dmazhukov/cronguard/v)[0-9]+\.[0-9]+\.[0-9]+#\1${NEW_VER}#g
              s#(raw\.githubusercontent\.com/dmazhukov/cronguard/v)[0-9]+\.[0-9]+\.[0-9]+#\1${NEW_VER}#g
            " "$f"
          done

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/auto-bump-pins
          delete-branch: true
          base: main
          commit-message: "docs: bump Quickstart pins to ${{ steps.ver.outputs.no_v }}"
          title: "docs: bump Quickstart pins to ${{ steps.ver.outputs.no_v }} (auto)"
          body: |
            Automatic bump after release `${{ github.ref_name }}` shipped
            (chart published to GHCR + GH Pages). This PR is opened idempotently
            by `release.yml`'s `bump-docs` job.

            Updated `--version` pins and download URLs across:
            - `README.md`
            - `charts/cronguard/README.md`
            - `docs/distribution.md`

            ## How to merge

            CI does not auto-trigger on this PR — `GITHUB_TOKEN`-opened PRs
            don't kick off other workflows by design. Two options:

            1. **Close + reopen the PR** to trigger `ci.yml`, then merge once green.
            2. **Merge via admin bypass** — the change is docs-only and goes through `sed` regex tested against the same files for years.
          labels: docs,auto
