version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Single kubernetes group covers BOTH k8s.io/* and sigs.k8s.io/*
      # (controller-runtime, controller-tools, etc). They MUST move together
      # because controller-runtime's interfaces compose with client-go's
      # ResourceEventHandlerRegistration et al — bumping K8s ahead of
      # controller-runtime produces unbuildable code (see PR #17 / #40,
      # 2026-04-29). The previous split (kubernetes + controller-runtime)
      # had overlapping patterns and let Dependabot push K8s 0.36 alone,
      # which couldn't pass CI.
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      observability:
        patterns:
          - "github.com/prometheus/*"
          - "github.com/onsi/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Docker (operator image base)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Moscow"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
