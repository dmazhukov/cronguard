apiVersion: monitoring.cronguard.io/v1alpha1
kind: CronJobMonitor
metadata:
  name: nightly-settlement
  namespace: default
spec:
  cronJobRef:
    name: nightly-settlement
  schedule: "*/2 * * * *"
  maxDurationSeconds: 30
  maxConsecutiveFailures: 2
  alertAfterMissedRuns: 2
  gracePeriodSeconds: 60
  historyLimit: 10
