---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: cronjobmonitors.monitoring.cronguard.io
spec:
  group: monitoring.cronguard.io
  names:
    categories:
    - monitoring
    kind: CronJobMonitor
    listKind: CronJobMonitorList
    plural: cronjobmonitors
    shortNames:
    - cjmon
    - cjm
    singular: cronjobmonitor
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.resolvedSchedule
      name: Schedule
      type: string
    - jsonPath: .status.lastSuccessTime
      name: LastSuccess
      type: date
    - jsonPath: .status.consecutiveFailures
      name: ConsecFails
      type: integer
    - jsonPath: .status.missedRuns
      name: Missed
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CronJobMonitor declares an SLO for a CronJob and records its
          observed state.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CronJobMonitorSpec defines the desired SLO for a CronJob.
            properties:
              alertAfterMissedRuns:
                default: 2
                description: |-
                  AlertAfterMissedRuns is the number of consecutive missed expected runs
                  that flips ScheduleHealthy to False.
                format: int32
                minimum: 1
                type: integer
              cronJobRef:
                description: CronJobRef points at the CronJob this monitor observes.
                properties:
                  name:
                    description: |-
                      Name is the name of the CronJob in the same namespace as this CronJobMonitor.
                      Must be a DNS-1123 label (lowercase alphanumeric with hyphens, up to 63 chars).
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                required:
                - name
                type: object
              gracePeriodSeconds:
                default: 60
                description: |-
                  GracePeriodSeconds is the tolerance window after an expected run before
                  the run is considered missed.
                format: int32
                minimum: 0
                type: integer
              historyLimit:
                default: 10
                description: HistoryLimit is the maximum number of recent executions
                  kept in status.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              maxConsecutiveFailures:
                default: 2
                description: |-
                  MaxConsecutiveFailures is the number of consecutive failed runs that
                  flips ExecutionHealthy to False.
                format: int32
                minimum: 1
                type: integer
              maxDurationSeconds:
                description: |-
                  MaxDurationSeconds is the SLO for a single Job's wall-clock duration.
                  When unset, the check is disabled.
                format: int32
                minimum: 1
                type: integer
              schedule:
                description: |-
                  Schedule is the expected cron expression. When unset, the controller
                  falls back to the referenced CronJob's spec.schedule.
                maxLength: 128
                minLength: 1
                type: string
              timeZone:
                description: |-
                  TimeZone is the IANA time-zone name (e.g. "America/New_York", "Europe/Moscow")
                  the schedule is evaluated in. When unset, the controller falls back to
                  the referenced CronJob's spec.timeZone, then to UTC. Has no effect when
                  the schedule expression already carries a CRON_TZ=/TZ= prefix.
                maxLength: 64
                minLength: 1
                type: string
            required:
            - cronJobRef
            type: object
          status:
            description: CronJobMonitorStatus captures the observed SLO state of the
              monitored CronJob.
            properties:
              conditions:
                description: Conditions reflect the current SLO evaluation.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                maxItems: 10
                type: array
              consecutiveFailures:
                description: ConsecutiveFailures counts terminal failures in a row;
                  resets on success.
                format: int32
                type: integer
              lastFailureTime:
                format: date-time
                type: string
              lastScheduleTime:
                format: date-time
                type: string
              lastSuccessTime:
                format: date-time
                type: string
              missedRuns:
                description: MissedRuns counts consecutive expected runs that did
                  not start within grace.
                format: int32
                type: integer
              nextExpectedTime:
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration matches metadata.generation after
                  a successful reconcile.
                format: int64
                type: integer
              recentExecutions:
                description: RecentExecutions is a newest-first ring buffer of size
                  HistoryLimit.
                items:
                  description: ExecutionRecord summarises a single Job execution observed
                    by the controller.
                  properties:
                    driftSeconds:
                      format: int32
                      type: integer
                    durationSeconds:
                      format: int32
                      type: integer
                    endTime:
                      format: date-time
                      type: string
                    expectedStartTime:
                      format: date-time
                      type: string
                    jobName:
                      type: string
                    phase:
                      description: ExecutionPhase is a closed set of values for ExecutionRecord.Phase.
                      enum:
                      - Succeeded
                      - Failed
                      - Running
                      type: string
                    startTime:
                      format: date-time
                      type: string
                  required:
                  - jobName
                  - phase
                  - startTime
                  type: object
                maxItems: 100
                type: array
              resolvedSchedule:
                description: |-
                  ResolvedSchedule is the schedule used for evaluation (spec.schedule or
                  CronJob.spec.schedule).
                type: string
              resolvedTimeZone:
                description: |-
                  ResolvedTimeZone is the IANA time zone the schedule was evaluated in
                  (spec.timeZone, or the referenced CronJob's spec.timeZone, or UTC).
                type: string
              scheduleDriftSeconds:
                description: ScheduleDriftSeconds is the drift of the most recent
                  run.
                format: int32
                type: integer
            required:
            - consecutiveFailures
            - missedRuns
            - scheduleDriftSeconds
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
