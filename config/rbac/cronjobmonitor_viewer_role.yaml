# This rule is not used by the project cronguard itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to monitoring.cronguard.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cronguard
    app.kubernetes.io/managed-by: kustomize
  name: cronjobmonitor-viewer-role
rules:
- apiGroups:
  - monitoring.cronguard.io
  resources:
  - cronjobmonitors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.cronguard.io
  resources:
  - cronjobmonitors/status
  verbs:
  - get
